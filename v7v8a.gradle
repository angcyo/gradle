//apply from: allGradle.v7v8a

android {
    defaultConfig {
        // 设置支持的SO库架构
        if (Integer.parseInt(com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION.split("\\.")[0]) >= 8) {
            ndk.abiFilters.clear()
            ndk.abiFilters.addAll(["arm64-v8a", "armeabi-v7a"])
        } else {
            ndk {
                abiFilters 'armeabi-v7a', 'arm64-v8a'
            }
        }
    }
}